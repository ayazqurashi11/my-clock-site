<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Time Dashboard</title>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.03);
            --text: #f8fafc;
            --accent: #38bdf8;
            --ad-bg: #1e293b;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* --- AD SPACES --- */
        .ad-banner {
            width: 100%;
            max-width: 970px;
            height: 90px;
            background: var(--ad-bg);
            margin: 20px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px dashed #475569;
            color: #475569;
            font-size: 0.8rem;
            text-transform: uppercase;
        }

        .main-layout {
            display: flex;
            width: 100%;
            max-width: 1200px;
            justify-content: center;
            gap: 20px;
            flex-grow: 1;
        }

        .side-ad {
            width: 160px;
            height: 600px;
            background: var(--ad-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px dashed #475569;
            writing-mode: vertical-rl;
            color: #475569;
        }

        /* --- CENTER CLOCK --- */
        .content-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #clock {
            font-size: 8rem; /* BIG CLOCK */
            font-weight: 900;
            letter-spacing: -5px;
            color: var(--accent);
            text-shadow: 0 0 30px rgba(56, 189, 248, 0.3);
            margin-bottom: 0;
        }

        #date {
            font-size: 1.5rem;
            color: #94a3b8;
            margin-top: -10px;
            letter-spacing: 5px;
            text-transform: uppercase;
        }

        /* --- STOPWATCH CARD --- */
        .stopwatch-card {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-top: 50px;
            width: 300px;
            text-align: center;
        }

        .controls button {
            background: var(--accent);
            color: var(--bg);
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin: 5px;
        }
    </style>
</head>
<body>

    <div class="ad-banner">Top Leaderboard Ad Space (970x90)</div>

    <div class="main-layout">
        <div class="side-ad">Skyscraper Ad Space (160x600)</div>

        <div class="content-area">
            <div id="clock">00:00:00</div>
            <div id="date">LOADING...</div>

            <div class="stopwatch-card">
                <div id="stopwatch-display" style="font-size: 2rem; font-weight: bold;">00:00:00</div>
                <div class="controls">
                    <button onclick="startStopwatch()">Start</button>
                    <button onclick="stopStopwatch()" style="background:#ef4444; color:white;">Stop</button>
                    <button onclick="resetStopwatch()" style="background:#64748b; color:white;">Reset</button>
                </div>
            </div>
        </div>

        <div class="side-ad">Skyscraper Ad Space (160x600)</div>
    </div>

    <div class="ad-banner">Footer Ad Space (970x90)</div>

    <script>
        // Real-time Clock logic
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString([], {hour12: false});
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('date').textContent = now.toLocaleDateString(undefined, options);
        }
        setInterval(updateClock, 1000);
        updateClock();

        // Basic Stopwatch logic
        let startTime, timerInterval, elapsedTime = 0;
        function timeToString(time) {
            let hh = Math.floor(time / 3600000).toString().padStart(2, "0");
            let mm = Math.floor((time % 3600000) / 60000).toString().padStart(2, "0");
            let ss = Math.floor((time % 60000) / 1000).toString().padStart(2, "0");
            return `${hh}:${mm}:${ss}`;
        }
        function startStopwatch() {
            if (timerInterval) return;
            startTime = Date.now() - elapsedTime;
            timerInterval = setInterval(() => {
                elapsedTime = Date.now() - startTime;
                document.getElementById("stopwatch-display").textContent = timeToString(elapsedTime);
            }, 1000);
        }
        function stopStopwatch() { clearInterval(timerInterval); timerInterval = null; }
        function resetStopwatch() { stopStopwatch(); elapsedTime = 0; document.getElementById("stopwatch-display").textContent = "00:00:00"; }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Time Dashboard</title>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.03);
            --text: #f8fafc;
            --accent: #38bdf8;
            --ad-bg: #1e293b;
            --ad-border: #334155;
        }

        /* Basic Setup */
        body {
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- AD SPACES --- */
        .ad-horizontal {
            width: 95%;
            max-width: 970px;
            height: 90px;
            background: var(--ad-bg);
            margin: 20px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px dashed var(--ad-border);
            color: #64748b;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 8px;
        }

        .main-container {
            display: flex;
            width: 100%;
            max-width: 1400px;
            flex: 1;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            box-sizing: border-box;
        }

        .side-ad {
            width: 160px;
            height: 600px;
            background: var(--ad-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px dashed var(--ad-border);
            writing-mode: vertical-rl;
            color: #64748b;
            font-size: 0.75rem;
            border-radius: 8px;
        }

        /* --- CENTER CONTENT --- */
        .content-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        #clock {
            font-size: 10rem; /* Massive size for desktop */
            font-weight: 900;
            line-height: 1;
            color: var(--accent);
            text-shadow: 0 0 40px rgba(56, 189, 248, 0.2);
            margin: 0;
            font-variant-numeric: tabular-nums;
        }

        #date {
            font-size: 1.5rem;
            color: #94a3b8;
            margin-top: 10px;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        /* --- TOOLS SECTION --- */
        .tools-container {
            margin-top: 40px;
            background: var(--card-bg);
            padding: 25px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            width: 100%;
            max-width: 350px;
        }

        #stopwatch-display {
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 20px;
            font-family: monospace;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-start { background: #22c55e; color: #fff; }
        .btn-stop { background: #ef4444; color: #fff; }
        .btn-reset { background: #475569; color: #fff; }
        button:hover { opacity: 0.9; transform: translateY(-2px); }

        /* --- MOBILE RESPONSIVENESS --- */
        @media (max-width: 1024px) {
            .side-ad {
                display: none; /* Remove side ads on tablets and phones */
            }
            #clock {
                font-size: 6rem;
            }
        }

        @media (max-width: 480px) {
            #clock {
                font-size: 4rem; /* Fit on small phones */
            }
            #date {
                font-size: 1rem;
                letter-spacing: 2px;
            }
            .ad-horizontal {
                height: 60px;
                font-size: 0.6rem;
            }
        }
    </style>
</head>
<body>

    <div class="ad-horizontal">
        Your Ad Here (970x90 Leaderboard)
    </div>

    <div class="main-container">
        <div class="side-ad">Side Ad Space (160x600)</div>

        <div class="content-area">
            <div id="clock">00:00:00</div>
            <div id="date">LOADING DATE...</div>

            <div class="tools-container">
                <div style="font-size: 0.7rem; color: var(--accent); margin-bottom: 10px; letter-spacing: 2px;">STOPWATCH</div>
                <div id="stopwatch-display">00:00:00</div>
                <div class="btn-group">
                    <button class="btn-start" onclick="startStopwatch()">START</button>
                    <button class="btn-stop" onclick="stopStopwatch()">STOP</button>
                    <button class="btn-reset" onclick="resetStopwatch()">RESET</button>
                </div>
            </div>
        </div>

        <div class="side-ad">Side Ad Space (160x600)</div>
    </div>

    <div class="ad-horizontal">
        Footer Ad Space (970x90)
    </div>

    <script>
        // --- CLOCK LOGIC ---
        function updateClock() {
            const now = new Date();
            
            // Format: HH:MM:SS
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('clock').textContent = `${hours}:${minutes}:${seconds}`;
            
            // Format Date
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('date').textContent = now.toLocaleDateString(undefined, options);
        }
        setInterval(updateClock, 1000);
        updateClock();

        // --- STOPWATCH LOGIC ---
        let startTime, timerInterval, elapsedTime = 0;

        function timeToString(time) {
            let hh = Math.floor(time / 3600000).toString().padStart(2, "0");
            let mm = Math.floor((time % 3600000) / 60000).toString().padStart(2, "0");
            let ss = Math.floor((time % 60000) / 1000).toString().padStart(2, "0");
            return `${hh}:${mm}:${ss}`;
        }

        function startStopwatch() {
            if (timerInterval) return;
            startTime = Date.now() - elapsedTime;
            timerInterval = setInterval(() => {
                elapsedTime = Date.now() - startTime;
                document.getElementById("stopwatch-display").textContent = timeToString(elapsedTime);
            }, 100); // Updated to 100ms for smoother visual
        }

        function stopStopwatch() {
            clearInterval(timerInterval);
            timerInterval = null;
        }

        function resetStopwatch() {
            stopStopwatch();
            elapsedTime = 0;
            document.getElementById("stopwatch-display").textContent = "00:00:00";
        }
    </script>
</body>
</html>
